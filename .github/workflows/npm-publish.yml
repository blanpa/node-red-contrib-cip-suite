name: npm-publish

# Publishes the package to npm via OIDC Trusted Publishing.
# No NPM_TOKEN secret is required — the trusted publisher must be configured
# on npmjs.com for this repo and this workflow file (.github/workflows/npm-publish.yml).
#
# Triggers on a pushed version tag (e.g. v0.0.2) or a manual run.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
