<script type="text/html" data-help-name="cip-energy">
  <p>CIP Energy — power/energy management (ODVA Volume 2, Ch.4-15).</p>
  <h3>Commands (msg.command):</h3>
  <ul>
    <li><b>status</b> — Read base energy status (power, energy, mode)</li>
    <li><b>electrical</b> — Read electrical measurements (V, A, Hz, PF, W, kWh)</li>
    <li><b>setMode</b> — Set energy mode (msg.payload.mode: 0-3)</li>
    <li><b>normal/saving/off/pause</b> — Shorthand mode commands</li>
    <li><b>resetPeak</b> — Reset peak power measurement</li>
  </ul>
