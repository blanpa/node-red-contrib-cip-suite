<script type="text/javascript">
  RED.nodes.registerType("cip-write", {
    category: "CIP Suite",
    color: "#999999",
    defaults: {
      name: { value: "" },
      endpoint: { value: "", type: "cip-endpoint", required: true },
      tagName: { value: "" },
      dataType: { value: "auto" },
      staticValue: { value: "" },
      useStaticValue: { value: false }
    },
    inputs: 1,
    outputs: 1,
    icon: "cip.svg",
    paletteLabel: "cip write",
    label: function () {
      return this.name || this.tagName || "cip write";
    }
  });
</script>

<script type="text/html" data-template-name="cip-write">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-endpoint"><i class="fa fa-server"></i> Endpoint</label>
    <input type="text" id="node-input-endpoint" />
  </div>
  <div class="form-row">
    <label for="node-input-tagName"><i class="fa fa-bookmark"></i> Tag Name</label>
    <div style="display:flex; gap:4px;">
      <input type="text" id="node-input-tagName" placeholder="Program:MainProgram.MyTag" style="flex:1" />
      <button type="button" id="node-input-browse-btn" class="red-ui-button" title="Browse tags from PLC">
        <i class="fa fa-search"></i>
      </button>
    </div>
  </div>
  <div class="form-row" id="node-input-taglist-row" style="display:none;">
    <label><i class="fa fa-list"></i> Tags</label>
    <select id="node-input-taglist" size="8" style="width:70%; font-family:monospace;"></select>
  </div>
  <div class="form-row">
    <label for="node-input-dataType"><i class="fa fa-database"></i> Data Type</label>
    <select id="node-input-dataType">
      <option value="auto">Auto-detect</option>
      <option value="BOOL">BOOL</option>
      <option value="INT">INT (16-bit)</option>
      <option value="DINT">DINT (32-bit)</option>
      <option value="REAL">REAL (float)</option>
      <option value="STRING">STRING</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-useStaticValue"><i class="fa fa-pencil"></i> Static Value</label>
    <input type="checkbox" id="node-input-useStaticValue" style="width:auto" />
    <span>Use static value instead of msg.payload</span>
  </div>
  <div class="form-row">
    <label for="node-input-staticValue"><i class="fa fa-pencil-square-o"></i> Value</label>
    <input type="text" id="node-input-staticValue" placeholder="Static value" />
  </div>
</script>

<script type="text/html" data-help-name="cip-write">
  <p>Writes a value to a tag on an Allen-Bradley PLC via EtherNet/IP (CIP).</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">*</span></dt>
    <dd>The value to write (unless static value is configured).</dd>
    <dt>tagName <span class="property-type">string</span></dt>
    <dd>Optional override for the configured tag name.</dd>
  </dl>
  <p>For batch writes, set <code>msg.tags</code> to an array of objects, each with <code>name</code>
  and <code>value</code> properties. All tags are written in a single operation.</p>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload.success <span class="property-type">boolean</span></dt>
    <dd>Whether the write was successful.</dd>
    <dt>payload.tagName <span class="property-type">string</span></dt>
    <dd>The tag that was written.</dd>
    <dt>payload.timestamp <span class="property-type">number</span></dt>
    <dd>Unix timestamp (ms) of the write.</dd>
  </dl>
  <h3>Details</h3>
  <p>Backpressure is applied: if a write is already in-flight, subsequent messages are dropped with a warning.</p>
  <p>Click the <i class="fa fa-search"></i> button next to the tag name field to browse available tags
  from the connected PLC. The endpoint must be deployed and connected first.</p>
  <h3>Tag Addressing</h3>
  <ul>
    <li><b>Bit-level writes:</b> Use dot notation, e.g. <code>MyDint.5</code> writes bit 5 of a DINT tag.</li>
    <li><b>Array writes:</b> Use bracket notation, e.g. <code>MyArray[3]</code>. Pass an array as <code>msg.payload</code> to write multiple elements.</li>
    <li><b>UDT writes:</b> Access UDT members with dot notation, e.g. <code>MyUDT.MemberName</code>.</li>
    <li><b>Program-scoped:</b> Use <code>Program:MainProgram.TagName</code> syntax.</li>
  </ul>
  <h3>Batch Mode</h3>
  <p>Send <code>msg.tags</code> as an array of <code>{ name: "TagName", value: 42 }</code> objects to
  write multiple tags in one operation. The output <code>msg.payload</code> will contain results for each tag.</p>
</script>

<script type="text/javascript">
  (function () {
    $(document).on("click", "#node-input-browse-btn", function () {
      var endpointId = $("#node-input-endpoint").val();
      if (!endpointId || endpointId === "_ADD_") {
        RED.notify("Select and deploy an endpoint first.", "warning");
        return;
      }
      var btn = $(this);
      btn.prop("disabled", true).find("i").removeClass("fa-search").addClass("fa-spinner fa-spin");
      $.getJSON("cip-endpoint/" + endpointId + "/browse")
        .done(function (tags) {
          var sel = $("#node-input-taglist");
          sel.empty();
          if (!tags.length) {
            sel.append('<option disabled>No tags found</option>');
          }
          tags.forEach(function (t) {
            var label = t.name + (t.type ? "  (" + t.type + ")" : "");
            sel.append($("<option>").val(t.name).text(label));
          });
          $("#node-input-taglist-row").slideDown(200);
        })
        .fail(function (xhr) {
          var msg = xhr.responseJSON ? xhr.responseJSON.error : "Browse failed";
          RED.notify(msg, "error");
        })
        .always(function () {
          btn.prop("disabled", false).find("i").removeClass("fa-spinner fa-spin").addClass("fa-search");
        });
    });
    $(document).on("dblclick", "#node-input-taglist", function () {
      var val = $(this).val();
      if (val) {
        $("#node-input-tagName").val(val);
        $("#node-input-taglist-row").slideUp(200);
      }
    });
    $(document).on("change", "#node-input-taglist", function () {
      var val = $(this).val();
      if (val) {
        $("#node-input-tagName").val(val);
      }
    });
  })();
</script>
