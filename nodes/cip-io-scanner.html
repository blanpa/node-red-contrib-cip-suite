<script type="text/html" data-help-name="cip-io-scanner">
  <p>I/O Scanner node for implicit (UDP Class 1) messaging with remote I/O modules,
  drives, and other EtherNet/IP adapters.</p>

  <h3>Configuration</h3>
  <dl class="message-properties">
    <dt>Target IP <span class="property-type">string</span></dt>
    <dd>IP address of the target I/O adapter device.</dd>
    <dt>RPI <span class="property-type">number</span></dt>
    <dd>Requested Packet Interval in milliseconds. This is the cyclic data exchange rate.</dd>
    <dt>Input/Output Assembly <span class="property-type">number</span></dt>
    <dd>Assembly instance numbers. Check your device EDS file or documentation.</dd>
    <dt>Input/Output Size <span class="property-type">number</span></dt>
    <dd>Data sizes in bytes (application data only — do <b>not</b> count the Run/Idle header here).</dd>
    <dt>32-bit Run/Idle header <span class="property-type">boolean</span></dt>
    <dd>Prepends the 4-byte Run/Idle header to the O&rarr;T (output) data, as required
    by the ODVA AC/DC drive profile and most exclusive-owner I/O. <b>Leave enabled for
    PowerFlex drives</b> — without it the drive stays in Idle and ignores the output
    assembly. The node adds the 4 bytes to the negotiated connection size automatically.</dd>
    <dt>Electronic keying <span class="property-type">boolean</span></dt>
    <dd>Off by default — the connection path carries <b>no</b> key segment, meaning
    &ldquo;don&rsquo;t check identity&rdquo;, which every target must accept and is the most
    compatible choice. Enable it only if a strict target rejects an unkeyed connection;
    then fill in the Vendor ID, Device Type, Product Code, and Major/Minor revision to
    match the device (from its EDS file or identity object). The <b>Compatibility</b>
    checkbox sets the major-revision compatibility bit so the target accepts any
    compatible revision instead of an exact match.</dd>
  </dl>

  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">Buffer</span></dt>
    <dd>Output data (the application assembly only — the Run/Idle header is added for you).</dd>
    <dt>command / run <span class="property-type">string / boolean</span></dt>
    <dd><code>command:"run"</code> / <code>run:true</code> sets the Run/Idle header to Run;
    <code>command:"idle"</code> / <code>run:false</code> sets it to Idle. Can be sent with or
    without a <code>payload</code>.</dd>
  </dl>

  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd><code>{ input: Buffer, parsed: number[], sequence: number, timestamp: number }</code></dd>
  </dl>

  <h3>Supported Devices</h3>
  <p>1734 POINT I/O, PowerFlex drives, Kinetix servos, any EtherNet/IP adapter with implicit messaging.</p>

  <h3>PowerFlex 525 example</h3>
  <p>Values verified against a working PLC&rarr;PF525 I/O connection (Wireshark capture):</p>
  <ul>
    <li>Output Assembly <code>2</code>, Output Size <code>4</code> (Logic Command word + Speed Reference word)</li>
    <li>Input Assembly <code>1</code>, Input Size <code>8</code> (Logic Status word + Speed Feedback + datalinks)</li>
    <li>Config Assembly <code>6</code>, RPI <code>100</code> ms, Run/Idle header <b>on</b></li>
  </ul>
  <p>These are the drive&rsquo;s native assembly instances (Output&nbsp;2 / Input&nbsp;1 / Config&nbsp;6),
  which differ from the generic ODVA AC-drive assemblies (20/70). Leave electronic keying
  <b>off</b> first; only enable it if the drive refuses the unkeyed connection. Confirm the
  Logic Command bit map and the Speed Reference scaling against PowerFlex 520-series
  publication <i>520-UM001</i> for your drive&rsquo;s configuration.</p>
</script>
